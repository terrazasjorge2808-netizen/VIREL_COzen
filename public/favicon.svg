<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Favicon SVG para VIREL_COzen: sombra disuelta en calma -->
  <defs>
    <style>
      .circle-base { fill: #1a1a1a; }
      .accent-light { fill: #f5f5f5; }
    </style>
  </defs>
  <!-- Fondo oscuro minimalista -->
  <rect width="32" height="32" class="circle-base"/>
  <!-- Punto central - luz convertida en pensamiento -->
  <circle cx="16" cy="16" r="2" class="accent-light"/>
  <!-- Movimiento convertido en respiración -->
  <path d="M 16 8 Q 22 12 22 16 Q 22 20 16 24 Q 10 20 10 16 Q 10 12 16 8" 
        fill="none" stroke="#f5f5f5" stroke-width="1" opacity="0.6"/>
</svg>